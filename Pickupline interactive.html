<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lynQwear Dynamic Pickuplines</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#000;font-family:'Poppins',sans-serif;overflow:hidden;color:#fff;text-align:center}
   .wrapper{
      height:100svh;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    }
   .hero{
      width:100vw;
      /* mehr Platz für interaktive Caption (~8rem) */
      height:calc(100svh - 8rem);
      object-fit:cover;
      object-position:center;
      display:block;
      border-radius:10px;
    }
    #message{
      margin-top:.75rem;
      font-size:clamp(1.1rem,3.5vw,1.6rem);
      line-height:1.2;
      padding:0 1rem;
    }
    #buttons{
      display:flex; gap:.5rem; margin-top:.75rem; margin-bottom:1rem;
    }
    button{
      padding:10px 20px;
      font-size:18px;
      font-family:'Poppins',sans-serif;
      cursor:pointer;
      border:2px solid #fff;
      border-radius:5px;
      background:#000;
      color:#fff;
      transition:all.2s;
    }
    button:hover{ background:#222; }
  </style>
</head>
<body>

  <div class="wrapper">
    <img id="mainImage" class="hero" src="" alt="Shirt Design">
    <div id="message"></div>
    <div id="buttons">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>
  </div>

  <script>
    // Array mit allen Pickuplines / Shirts
    const pickuplines = [
      {
        start: {image: 'Pickupline.jpeg', text: 'Caught you smiling?'},
        yes: {image: 'Flat Earth Pickupline.jpeg', text: 'Congrats! Your humor is flatter than Earth!'},
        no: {image: 'You liar Pcikupline.jpeg', text: "Don't lie, I see you smirking"}
      },
      // Weitere Pickuplines können hier ergänzt werden
    ];

    let currentIndex = 0;

    const mainImage = document.getElementById('mainImage');
    const message = document.getElementById('message');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');

    function loadPickupline(index) {
      const current = pickuplines[index];
      mainImage.src = current.start.image;
      message.textContent = current.start.text;
      document.getElementById('buttons').style.display = 'flex';
    }

    function handleYes() {
      const current = pickuplines[currentIndex];
      mainImage.src = current.yes.image;
      message.textContent = current.yes.text;
      document.getElementById('buttons').style.display = 'none';
    }

    function handleNo() {
      const current = pickuplines[currentIndex];
      mainImage.src = current.no.image;
      message.textContent = current.no.text;
      document.getElementById('buttons').style.display = 'none';
    }

    yesBtn.addEventListener('click', handleYes);
    noBtn.addEventListener('click', handleNo);

    // Lade die erste Pickupline
    loadPickupline(currentIndex);
  </script>

</body>
</html>
