<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>lynQwear</title>
  <!-- Poppins Font von Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }
    img {
      max-width: 80%;
      max-height: 50%;
      border-radius: 10px;
      margin-bottom: 20px; /* Abstand zum Text */
    }
    #caption {
      font-size: 28px; /* Gut lesbare Größe */
      font-weight: 600;
    }
  </style>
</head>
<body>
  <img src="picture us together.png" alt="Shirt Design">
  <div id="caption">I can picture us together</div>
</body>
</html>
