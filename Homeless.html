<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>lynQwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 24px;
    }
    img {
      max-width: 90vw;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 12px;
    }
    .caption {
      margin-top: 20px;
      font-size: clamp(24px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <img src="Homeless.jpeg" alt="Spark Change">
  <div class="caption">Not being homeless 🥲</div>
</body>
</html>
