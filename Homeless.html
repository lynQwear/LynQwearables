<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lynQwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: #000; color: #fff; overflow: hidden; }
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1 1 auto;                 /* nimmt fast alles */
      background: url("Homeless.jpeg") center center / cover no-repeat;
    }
    .caption {
      height: 64px;                   /* schmale Zeile unten */
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 3.5vw, 40px);
      line-height: 1;
      background: #000;
      padding: 0 12px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero"></div>
    <div class="caption">Not being homeless 🥲</div>
  </div>
</body>
</html>
