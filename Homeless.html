<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lynQwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: #000; color: #fff; }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
    }
    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;   /* füllt den verfügbaren Bereich komplett */
      object-position: center;
      display: block;
    }
    .caption {
      flex: 0 0 auto;
      padding: 18px 16px 28px;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(22px, 4.5vw, 56px);
      line-height: 1.1;
      background: #000; /* eigener Bereich unter dem Bild */
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <img src="Homeless.jpg" alt="Spark Change">
    </div>
    <div class="caption">Not being homeless 🥲</div>
  </div>
</body>
</html>
