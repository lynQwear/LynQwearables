<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lynQwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: #000; color: #fff; }
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      height: calc(100vh - 92px); /* Platz für Caption unten */
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      overflow: hidden;
    }
    .hero img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;   /* ganzes Bild sichtbar */
      display: block;
    }
    .caption {
      height: 92px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(20px, 4vw, 48px);
      line-height: 1.1;
      background: #000;
      padding: 0 16px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <img src="Homeless.jpeg" alt="Spark Change">
    </div>
    <div class="caption">Not being homeless 🥲</div>
  </div>
</body>
</html>
